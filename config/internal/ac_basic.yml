Name: Basic build flags
Description: common flags both for build and for judge
Version: null

Cflags: >
    -std=gnu++23

variant:
    gcc:
        Libs: >
            -lstdc++exp

            -Wl,-R${prefix}/libexec/gcc/x86_64-pc-linux-gnu/15.1.0
            -Wl,-R${prefix}/lib/gcc/x86_64-pc-linux-gnu/15.1.0/plugin

    clang:
        Cflags: >
            -fuse-ld=lld

            -stdlib=libc++
            -fexperimental-library

            -rtlib=compiler-rt
            -unwindlib=libunwind

        Libs: >
            -Wl,-R${install_dir}/lib/x86_64-unknown-linux-gnu
            -Wl,-R${install_dir}/lib/clang/20/lib/x86_64-unknown-linux-gnu
